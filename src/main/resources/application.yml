spring:
  application:
    name: referral-platform

  datasource:
    url: jdbc:mysql://localhost:3307/referral_platform?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: referral_user
    password: referral_pass
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    show-sql: true
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

app:
  base-url: http://localhost:8080
  jwt:
    secret: your-secret-key-change-this-in-production-min-256-bits
    expiration-minutes: 120

logging:
  level:
    com.actpro.referral: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
